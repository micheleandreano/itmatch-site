# netlify.toml — ITMatch (itmatch.app)
# Config di build per Astro. Vale sia per deploy via CLI sia per auto-deploy da Git.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Header di sicurezza di base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache lunga per gli asset ottimizzati da Astro (hash nel nome = safe)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
